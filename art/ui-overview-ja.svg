<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="Segoe UI, sans-serif" font-size="12">
  <!-- Background -->
  <rect width="720" height="480" fill="#1e1e1e"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="720" height="26" fill="#3c3c3c"/>
  <text x="360" y="17" fill="#cccccc" text-anchor="middle" font-size="11">my-project — Visual Studio Code</text>

  <!-- Activity Bar -->
  <rect x="0" y="26" width="40" height="454" fill="#333333"/>
  <rect x="6" y="34" width="28" height="28" rx="4" fill="#555"/>
  <text x="20" y="53" fill="#999" text-anchor="middle" font-size="13">📄</text>
  <rect x="6" y="68" width="28" height="28" rx="4" fill="#555"/>
  <text x="20" y="87" fill="#999" text-anchor="middle" font-size="13">🔍</text>

  <!-- Sidebar -->
  <rect x="40" y="26" width="160" height="454" fill="#252526"/>
  <rect x="40" y="26" width="160" height="22" fill="#2d2d2d"/>
  <text x="50" y="41" fill="#bbbbbb" font-size="10" font-weight="bold">EXPLORER</text>
  <text x="56" y="62" fill="#cccccc" font-size="10">▾ src</text>
  <text x="68" y="77" fill="#cccccc" font-size="10">extension.ts</text>
  <text x="68" y="92" fill="#cccccc" font-size="10">worker.ts</text>

  <!-- Editor Area -->
  <rect x="200" y="26" width="520" height="22" fill="#2d2d2d"/>
  <rect x="200" y="26" width="100" height="22" fill="#1e1e1e"/>
  <text x="215" y="41" fill="#ffffff" font-size="10">extension.ts</text>
  <rect x="200" y="48" width="520" height="192" fill="#1e1e1e"/>
  <text x="220" y="70" fill="#569cd6" font-size="11">import</text>
  <text x="258" y="70" fill="#9cdcfe" font-size="11">* as vscode from 'vscode';</text>
  <text x="220" y="90" fill="#6a9955" font-size="11">// session tracking...</text>

  <!-- Panel separator -->
  <rect x="200" y="240" width="520" height="2" fill="#007acc"/>

  <!-- Panel Tabs -->
  <rect x="200" y="242" width="520" height="22" fill="#2d2d2d"/>
  <text x="215" y="257" fill="#ffffff" font-size="10" font-weight="bold">TERMINAL</text>
  <text x="285" y="257" fill="#888888" font-size="10">PROBLEMS</text>
  <text x="350" y="257" fill="#888888" font-size="10">OUTPUT</text>

  <!-- Terminal Tabs -->
  <rect x="200" y="264" width="520" height="22" fill="#1e1e1e"/>
  <rect x="204" y="266" width="60" height="18" rx="3" fill="#2d2d2d"/>
  <text x="212" y="279" fill="#ffffff" font-size="9">bash</text>
  <rect x="268" y="266" width="86" height="18" rx="3" fill="#2d2d2d"/>
  <text x="276" y="279" fill="#ffffff" font-size="9">Claude #1</text>
  <rect x="358" y="266" width="86" height="18" rx="3" fill="#2d2d2d"/>
  <text x="366" y="279" fill="#ffffff" font-size="9">Claude #2</text>

  <!-- Terminal Content -->
  <rect x="200" y="286" width="520" height="168" fill="#1e1e1e"/>
  <text x="220" y="308" fill="#33ff33" font-size="11">$ claude --session-id 3d783908-...</text>
  <text x="220" y="330" fill="#cccccc" font-size="11">╭─────────────────────────────────╮</text>
  <text x="220" y="346" fill="#cccccc" font-size="11">│  Claude Code  v2.1             │</text>
  <text x="220" y="362" fill="#cccccc" font-size="11">╰─────────────────────────────────╯</text>
  <text x="220" y="386" fill="#ffffff" font-size="11">&gt; テストを追加して...</text>

  <!-- Status Bar -->
  <rect x="0" y="454" width="720" height="26" fill="#007acc"/>
  <text x="10" y="471" fill="#ffffff" font-size="10">main*</text>
  <text x="60" y="471" fill="#ffffff" font-size="10">✓ 0  ⚠ 2</text>

  <!-- Status Bar: Claude indicator (HIGHLIGHTED) -->
  <rect x="510" y="456" width="180" height="22" rx="4" fill="rgba(255,255,255,0.15)"/>
  <text x="600" y="471" fill="#ffffff" text-anchor="middle" font-size="11">🖥 Claude: 2 live · 1 idle</text>

  <!-- Highlight ring around status bar item -->
  <rect x="506" y="453" width="188" height="26" rx="6" fill="none" stroke="#f1c40f" stroke-width="2.5"/>

  <!-- Annotation arrow + label -->
  <line x1="600" y1="408" x2="600" y2="448" stroke="#f1c40f" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="520" y="388" width="160" height="20" rx="4" fill="#f1c40f" opacity="0.9"/>
  <text x="600" y="402" fill="#1e1e1e" text-anchor="middle" font-size="11" font-weight="bold">ここをクリック ↓</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f1c40f"/>
    </marker>
  </defs>
</svg>
